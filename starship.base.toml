# The config based on https://starship.rs/presets/gruvbox-rainbow. "palettes.catppuccin_macchiato" from https://starship.rs/presets/catppuccin-powerline


"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](color_bg_1)\
$os\
$username\
$hostname\
[](bg:color_bg_2 fg:color_bg_1)\
$directory\
[](fg:color_bg_2 bg:color_bg_3)\
$git_branch\
$git_status\
[](fg:color_bg_3 bg:color_bg_4)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:color_bg_4 bg:color_bg_5)\
$docker_context\
$conda\
$pixi\
$mise\
$gcloud\
[](fg:color_bg_5 bg:color_bg_6)\
$time\
[ ](fg:color_bg_6)\
$line_break$character"""

palette = "__PALETTE__"
# palette = 'catppuccin_macchiato'
# palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg_6 = '#3c3836'
color_bg_5 = '#665c54'
color_bg_4 = '#458588'
color_bg_3 = '#689d6a'
color_bg_2 = '#d79921'
color_bg_1 = '#d65d0e'
color_red = '#cc241d'
color_green = '#98971a'


[palettes.catppuccin_macchiato]
color_fg0 =  "#181926"
color_bg_6 = "#f5a97f"
color_bg_5 = "#eed49f"
color_bg_4 = "#a6da95"
color_bg_3 = "#91d7e3"
color_bg_2 = "#8aadf4"
color_bg_1 = "#c6a0f6"
color_red = "#ed8796"
color_green = "#a6da95"



[os]
disabled = false
style = "bg:color_bg_1 fg:color_fg0"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Pop = ""

[username]
show_always = true
style_user = "bg:color_bg_1 fg:color_fg0"
style_root = "bg:color_bg_1 fg:color_fg0"
format = '[ $user]($style)'

[hostname]
ssh_only = false
style = "bg:color_bg_1 fg:color_fg0"
format = '[@$hostname$ssh_symbol ]($style)'
ssh_symbol = ' '

[directory]
style = "fg:color_fg0 bg:color_bg_2"
format = "[ $path ]($style)"
truncation_length = 5
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:color_bg_3"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_bg_3)]($style)'

[git_status]
style = "bg:color_bg_3"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_bg_3)]($style)'

[nodejs]
symbol = ""
style = "bg:color_bg_4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg_4)]($style)'

[c]
symbol = " "
style = "bg:color_bg_4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg_4)]($style)'

[cpp]
symbol = " "
style = "bg:color_bg_4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg_4)]($style)'

[rust]
symbol = ""
style = "bg:color_bg_4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg_4)]($style)'

[golang]
symbol = ""
style = "bg:color_bg_4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg_4)]($style)'

[php]
symbol = ""
style = "bg:color_bg_4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg_4)]($style)'

[java]
symbol = ""
style = "bg:color_bg_4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg_4)]($style)'

[kotlin]
symbol = ""
style = "bg:color_bg_4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg_4)]($style)'

[haskell]
symbol = ""
style = "bg:color_bg_4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg_4)]($style)'

[python]
symbol = ""
style = "bg:color_bg_4"
format = '[[ $symbol( $version)( $virtualenv) ](fg:color_fg0 bg:color_bg_4)]($style)'

[docker_context]
symbol = ""
style = "bg:color_bg_5"
format = '[[ $symbol( $context) ](fg:#83a598 bg:color_bg_5)]($style)'

[conda]
style = "bg:color_bg_5"
format = '[[ $symbol( $environment) ](fg:#83a598 bg:color_bg_5)]($style)'

[pixi]
style = "bg:color_bg_5"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg0 bg:color_bg_5)]($style)'

[gcloud]
symbol = "󱇶 "
style = "fg:color_fg0 bg:color_bg_5"
format = '[ $symbol$account(@$domain)(\($region\)) ]($style)'

[time]
disabled = false
time_format = "%T"
style = "bg:color_bg_6"
format = '[[  $time ](fg:color_fg0 bg:color_bg_6)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[\$](bold fg:color_green)'
error_symbol = '[\$](bold fg:color_red)'
